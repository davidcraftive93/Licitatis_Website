name: Deploy a Hostinger (manual)

# Despliegue de PRODUCCIÓN a Hostinger.
#
# - SOLO se ejecuta manualmente (workflow_dispatch). No hay disparadores automáticos:
#   subir código o fusionar una PR NUNCA despliega.
# - Requiere escribir la confirmación exacta "DEPLOY LICITATIS".
# - Por defecto solo despliega desde `main` (o una etiqueta); rechaza ramas feature/*.
# - Usa el GitHub Environment "production", donde deben guardarse los secretos de Hostinger.
# - Transfiere ÚNICAMENTE el artefacto estático generado (carpeta out/).

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Confirmación obligatoria. Escribe exactamente: DEPLOY LICITATIS"
        required: true
        type: string
      git_ref:
        description: "Rama, etiqueta o commit a desplegar (por defecto main)."
        required: true
        default: "main"
        type: string

concurrency:
  group: deploy-hostinger-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  guard:
    name: Validaciones previas
    runs-on: ubuntu-latest
    steps:
      - name: Validar confirmación exacta
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [ "$CONFIRMATION" != "DEPLOY LICITATIS" ]; then
            echo "::error::Confirmación incorrecta. Debes escribir exactamente: DEPLOY LICITATIS"
            exit 1
          fi
          echo "Confirmación válida."

      - name: Rechazar ramas feature/*
        env:
          GIT_REF: ${{ inputs.git_ref }}
        run: |
          case "$GIT_REF" in
            feature/*)
              echo "::error::No se despliega una rama feature/* a producción. Usa main o una etiqueta."
              exit 1
              ;;
          esac
          echo "Ref permitido: $GIT_REF"

  deploy:
    name: Build y sincronización
    needs: guard
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout del ref solicitado
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - name: Verificar que el ref pertenece a main o es una etiqueta
        run: |
          git fetch origin main --depth=1 || true
          if git merge-base --is-ancestor HEAD origin/main 2>/dev/null; then
            echo "OK: el commit está en el historial de main."
          elif git describe --exact-match --tags HEAD >/dev/null 2>&1; then
            echo "OK: el commit corresponde a una etiqueta."
          else
            echo "::error::El ref a desplegar no pertenece a main ni es una etiqueta. Abortando."
            exit 1
          fi

      - name: Registrar commit a desplegar
        run: |
          SHA="$(git rev-parse HEAD)"
          echo "Desplegando commit: $SHA"
          echo "DEPLOY_SHA=$SHA" >> "$GITHUB_ENV"

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build (export estático)
        # Variables públicas de configuración (NEXT_PUBLIC_*) inyectadas en el build.
        # Defínelas como "Variables" (no secretos) del entorno production o del repo.
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_CONTACT_EMAIL: ${{ vars.NEXT_PUBLIC_CONTACT_EMAIL }}
          NEXT_PUBLIC_HUBSPOT_PORTAL_ID: ${{ vars.NEXT_PUBLIC_HUBSPOT_PORTAL_ID }}
          NEXT_PUBLIC_HUBSPOT_FORM_ID: ${{ vars.NEXT_PUBLIC_HUBSPOT_FORM_ID }}
          NEXT_PUBLIC_ENABLE_ANALYTICS: ${{ vars.NEXT_PUBLIC_ENABLE_ANALYTICS }}
          NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
        run: npm run build

      - name: Verificar artefacto out/
        run: |
          test -d out || { echo "::error::No existe out/"; exit 1; }
          test -f out/index.html || { echo "::error::No existe out/index.html"; exit 1; }
          echo "Artefacto out/ verificado."

      - name: Validar ruta de despliegue
        env:
          DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
        run: |
          if [ -z "$DEPLOY_PATH" ]; then
            echo "::error::HOSTINGER_DEPLOY_PATH está vacío."
            exit 1
          fi
          case "$DEPLOY_PATH" in
            */public_html*) echo "Ruta de despliegue válida." ;;
            *) echo "::error::Ruta de despliegue inesperada ('$DEPLOY_PATH'). Abortando por seguridad."; exit 1 ;;
          esac

      - name: Preparar clave SSH y comprobar conexión
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
          SSH_USER: ${{ secrets.HOSTINGER_USERNAME }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          # Diagnóstico visible como anotación (NO expone la clave): longitud y tipo aparente.
          case "$SSH_KEY" in
            "") DTYPE="VACIO(secreto no llegó al entorno)" ;;
            ssh-ed25519*|ssh-rsa*|ecdsa-*|sk-*) DTYPE="CLAVE_PUBLICA(empieza por ssh-...)" ;;
            -----BEGIN*) DTYPE="PEM(-----BEGIN)" ;;
            LS0tLS*) DTYPE="base64(LS0tLS, esperado)" ;;
            *) DTYPE="OTRO(empieza por: $(printf '%s' "$SSH_KEY" | head -c 6))" ;;
          esac
          echo "::warning::[diag HOSTINGER_SSH_PRIVATE_KEY] longitud=${#SSH_KEY} tipo=$DTYPE"
          # La clave puede guardarse en el secreto en base64 (RECOMENDADO) o en texto PEM.
          # IMPORTANTE: hay que hacer chmod 600 ANTES de validar/usar la clave, porque
          # OpenSSH en Linux rechaza una clave privada con permisos abiertos.
          # 1) Intento base64.
          printf '%s' "$SSH_KEY" | base64 -d > ~/.ssh/id_deploy 2>/dev/null || true
          chmod 600 ~/.ssh/id_deploy 2>/dev/null || true
          if ssh-keygen -y -f ~/.ssh/id_deploy >/dev/null 2>&1; then
            echo "Clave privada leída desde base64."
          else
            # 2) Fallback: PEM tal cual (quitando CR).
            printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_deploy
            chmod 600 ~/.ssh/id_deploy 2>/dev/null || true
            echo "Clave privada leída como texto PEM."
          fi
          # Valida (con la clave ya en 600) y, si falla, muestra el error real de ssh-keygen.
          if ! ssh-keygen -y -f ~/.ssh/id_deploy >/dev/null 2>&1; then
            KEYERR="$(ssh-keygen -y -f ~/.ssh/id_deploy 2>&1 >/dev/null | head -2 | tr '\n' ' ')"
            echo "::error::Clave SSH inválida. ssh-keygen dice: ${KEYERR:-<sin mensaje>}. (diag longitud=${#SSH_KEY}). Guarda el secreto en base64 (ver docs/DEPLOYMENT.md)."
            exit 1
          fi
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "== Comprobación de conexión SSH =="
          if ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" \
               -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 \
               "$SSH_USER@$SSH_HOST" "echo SSH_OK; whoami"; then
            echo "Conexión SSH correcta."
          else
            echo "::error::No se pudo conectar por SSH (exit 255). Causas típicas: (1) clave privada mal pegada o con CRLF en el secreto HOSTINGER_SSH_PRIVATE_KEY; (2) la IP del runner de GitHub no está permitida en el allowlist de SSH de Hostinger; (3) host/puerto/usuario incorrectos. Revisa el mensaje de arriba (Permission denied = clave; Connection timed out = red/allowlist)."
            exit 1
          fi

      - name: Copia de seguridad remota (rollback)
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USERNAME }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
          DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 "$SSH_USER@$SSH_HOST" \
            "DP='$DEPLOY_PATH'; if [ -d \"\$DP\" ]; then cp -a \"\$DP\" \"\${DP%/}.backup-$(date +%Y%m%d%H%M%S)\" && echo 'Backup creado.'; else echo 'Sin backup: el directorio aún no existe.'; fi" || \
            echo "::warning::No se pudo crear backup remoto; continúa el despliegue."

      - name: Sincronizar out/ hacia Hostinger (solo el directorio de despliegue)
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USERNAME }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
          DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
        run: |
          # Usar $HOME (no ~) dentro de la cadena -e: el ~ NO se expande entre comillas
          # dobles y rsync no invoca un shell, así que la ruta de la clave quedaba literal.
          set +e
          RS_OUT="$(rsync -az --delete \
            -e "ssh -i $HOME/.ssh/id_deploy -p $SSH_PORT -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20" \
            out/ \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/" 2>&1)"
          RS_RC=$?
          set -e
          if [ "$RS_RC" -ne 0 ]; then
            echo "::error::rsync falló (rc=$RS_RC). Salida: $(printf '%s' "$RS_OUT" | tail -4 | tr '\n' ' | ')"
            exit 1
          fi
          echo "Sincronización completada."

      - name: Verificar que la web responde
        run: |
          sleep 5
          if curl -fsS -o /dev/null -w "HTTP %{http_code}\n" "https://licitatis.es/"; then
            echo "Producción responde en licitatis.es"
          elif curl -fsS -o /dev/null -w "HTTP %{http_code}\n" "https://www.licitatis.es/"; then
            echo "Producción responde en www.licitatis.es"
          else
            echo "::warning::No se pudo verificar la URL pública (¿dominio aún no conectado en Hostinger?)."
          fi

      - name: Resumen del despliegue
        run: echo "✅ Desplegado el commit $DEPLOY_SHA en Hostinger ($DEPLOY_PATH)."
