name: Deploy a Hostinger (manual)

# Despliegue de PRODUCCIÓN a Hostinger.
#
# - SOLO se ejecuta manualmente (workflow_dispatch). No hay disparadores automáticos:
#   subir código o fusionar una PR NUNCA despliega.
# - Requiere escribir la confirmación exacta "DEPLOY LICITATIS".
# - Por defecto solo despliega desde `main` (o una etiqueta); rechaza ramas feature/*.
# - Usa el GitHub Environment "production", donde deben guardarse los secretos de Hostinger.
# - Transfiere ÚNICAMENTE el artefacto estático generado (carpeta out/).

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Confirmación obligatoria. Escribe exactamente: DEPLOY LICITATIS"
        required: true
        type: string
      git_ref:
        description: "Rama, etiqueta o commit a desplegar (por defecto main)."
        required: true
        default: "main"
        type: string

concurrency:
  group: deploy-hostinger-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  guard:
    name: Validaciones previas
    runs-on: ubuntu-latest
    steps:
      - name: Validar confirmación exacta
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [ "$CONFIRMATION" != "DEPLOY LICITATIS" ]; then
            echo "::error::Confirmación incorrecta. Debes escribir exactamente: DEPLOY LICITATIS"
            exit 1
          fi
          echo "Confirmación válida."

      - name: Rechazar ramas feature/*
        env:
          GIT_REF: ${{ inputs.git_ref }}
        run: |
          case "$GIT_REF" in
            feature/*)
              echo "::error::No se despliega una rama feature/* a producción. Usa main o una etiqueta."
              exit 1
              ;;
          esac
          echo "Ref permitido: $GIT_REF"

  deploy:
    name: Build y sincronización
    needs: guard
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout del ref solicitado
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - name: Verificar que el ref pertenece a main o es una etiqueta
        run: |
          git fetch origin main --depth=1 || true
          if git merge-base --is-ancestor HEAD origin/main 2>/dev/null; then
            echo "OK: el commit está en el historial de main."
          elif git describe --exact-match --tags HEAD >/dev/null 2>&1; then
            echo "OK: el commit corresponde a una etiqueta."
          else
            echo "::error::El ref a desplegar no pertenece a main ni es una etiqueta. Abortando."
            exit 1
          fi

      - name: Registrar commit a desplegar
        run: |
          SHA="$(git rev-parse HEAD)"
          echo "Desplegando commit: $SHA"
          echo "DEPLOY_SHA=$SHA" >> "$GITHUB_ENV"

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build (export estático)
        # Variables públicas de configuración (NEXT_PUBLIC_*) inyectadas en el build.
        # Defínelas como "Variables" (no secretos) del entorno production o del repo.
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_CONTACT_EMAIL: ${{ vars.NEXT_PUBLIC_CONTACT_EMAIL }}
          NEXT_PUBLIC_HUBSPOT_PORTAL_ID: ${{ vars.NEXT_PUBLIC_HUBSPOT_PORTAL_ID }}
          NEXT_PUBLIC_HUBSPOT_FORM_ID: ${{ vars.NEXT_PUBLIC_HUBSPOT_FORM_ID }}
          NEXT_PUBLIC_ENABLE_ANALYTICS: ${{ vars.NEXT_PUBLIC_ENABLE_ANALYTICS }}
          NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
        run: npm run build

      - name: Verificar artefacto out/ y escribir sentinela
        run: |
          test -d out || { echo "::error::No existe out/"; exit 1; }
          test -f out/index.html || { echo "::error::No existe out/index.html"; exit 1; }
          # Sentinela de commit: permite verificar por HTTP que la web pública sirve ESTE build.
          printf '%s' "$DEPLOY_SHA" > out/__build_sha.txt
          echo "Artefacto out/ verificado. Sentinela __build_sha.txt=$DEPLOY_SHA"

      - name: Release gate legal (producción)
        # Bloquea el despliegue ante defectos que nunca deben salir a producción: dominio
        # canónico incorrecto, claims prohibidos, páginas legales ausentes o páginas noindex
        # en el sitemap. Con --deploy, los placeholders legales (páginas noindex) y HubSpot
        # sin configurar (el formulario degrada a correo, no pierde leads) quedan como AVISO.
        # Para comprobar la apertura pública completa: npm run verify:legal-launch:prod (estricto).
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_HUBSPOT_PORTAL_ID: ${{ vars.NEXT_PUBLIC_HUBSPOT_PORTAL_ID }}
          NEXT_PUBLIC_HUBSPOT_FORM_ID: ${{ vars.NEXT_PUBLIC_HUBSPOT_FORM_ID }}
        run: node scripts/verify-legal-launch.mjs --mode production --deploy

      - name: Validar ruta de despliegue
        env:
          DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
        run: |
          if [ -z "$DEPLOY_PATH" ]; then
            echo "::error::HOSTINGER_DEPLOY_PATH está vacío."
            exit 1
          fi
          case "$DEPLOY_PATH" in
            */public_html*) echo "Ruta de despliegue válida." ;;
            *) echo "::error::Ruta de despliegue inesperada ('$DEPLOY_PATH'). Abortando por seguridad."; exit 1 ;;
          esac

      - name: Preparar clave SSH y comprobar conexión
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
          SSH_USER: ${{ secrets.HOSTINGER_USERNAME }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          # Higiene de secretos: NO se imprime longitud, prefijo ni tipo de la clave
          # (evita filtrar información identificable del secreto en los logs).
          if [ -z "$SSH_KEY" ]; then
            echo "::error::El secreto HOSTINGER_SSH_PRIVATE_KEY está vacío o no llegó al entorno."
            exit 1
          fi
          # La clave puede guardarse en el secreto en base64 (RECOMENDADO) o en texto PEM.
          # IMPORTANTE: hay que hacer chmod 600 ANTES de validar/usar la clave, porque
          # OpenSSH en Linux rechaza una clave privada con permisos abiertos.
          # 1) Intento base64.
          printf '%s' "$SSH_KEY" | base64 -d > ~/.ssh/id_deploy 2>/dev/null || true
          chmod 600 ~/.ssh/id_deploy 2>/dev/null || true
          if ssh-keygen -y -f ~/.ssh/id_deploy >/dev/null 2>&1; then
            echo "Clave privada leída desde base64."
          else
            # 2) Fallback: PEM tal cual (quitando CR).
            printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_deploy
            chmod 600 ~/.ssh/id_deploy 2>/dev/null || true
            echo "Clave privada leída como texto PEM."
          fi
          # Valida (con la clave ya en 600) y, si falla, muestra el error real de ssh-keygen.
          if ! ssh-keygen -y -f ~/.ssh/id_deploy >/dev/null 2>&1; then
            KEYERR="$(ssh-keygen -y -f ~/.ssh/id_deploy 2>&1 >/dev/null | head -2 | tr '\n' ' ')"
            echo "::error::Clave SSH inválida. ssh-keygen dice: ${KEYERR:-<sin mensaje>}. Guarda el secreto en base64 (ver docs/DEPLOYMENT.md)."
            exit 1
          fi
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "== Comprobación de conexión SSH =="
          if ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" \
               -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 \
               "$SSH_USER@$SSH_HOST" "echo SSH_OK; whoami"; then
            echo "Conexión SSH correcta."
          else
            echo "::error::No se pudo conectar por SSH (exit 255). Causas típicas: (1) clave privada mal pegada o con CRLF en el secreto HOSTINGER_SSH_PRIVATE_KEY; (2) la IP del runner de GitHub no está permitida en el allowlist de SSH de Hostinger; (3) host/puerto/usuario incorrectos. Revisa el mensaje de arriba (Permission denied = clave; Connection timed out = red/allowlist)."
            exit 1
          fi

      - name: Detectar el docroot realmente servido (autocorrección)
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USERNAME }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
          DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
        run: |
          # Un deploy solo tiene efecto si escribe en el directorio DESDE EL QUE el servidor
          # publica licitatis.es. En Hostinger el dominio principal se sirve desde ~/public_html,
          # NO desde ~/domains/<dominio>/public_html. Lo detectamos sin adivinar: dejamos una
          # "sonda" (fichero cuyo contenido es su propia ruta) en cada candidato y consultamos
          # la URL pública; la que devuelve es el docroot realmente servido.
          DEPLOY_PATH="$(printf '%s' "$DEPLOY_PATH" | tr -d '\r\n')"
          SSH_PORT="$(printf '%s' "$SSH_PORT" | tr -d '\r\n')"
          SSH_USER="$(printf '%s' "$SSH_USER" | tr -d '\r\n')"
          SSH_HOST="$(printf '%s' "$SSH_HOST" | tr -d '\r\n')"
          # Opciones de ssh (se expanden por separado). NO metemos secretos dentro del
          # comando remoto: los candidatos se calculan con $HOME EN EL SERVIDOR y el dominio
          # va literal, así el enmascarado de secretos no puede romper el parseo remoto.
          SSHO="-i $HOME/.ssh/id_deploy -p $SSH_PORT -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20"
          PROBE="__docroot_probe_${DEPLOY_SHA}.txt"
          # 1) Escribe la sonda en cada candidato (contenido = su propia ruta).
          ssh $SSHO "$SSH_USER@$SSH_HOST" 'PB="'"$PROBE"'"; for d in "$HOME/public_html" "$HOME/domains/licitatis.es/public_html"; do [ -d "$d" ] && printf "%s" "$d" > "$d/$PB" 2>/dev/null || true; done' || true
          # 2) La URL pública devuelve la sonda del docroot realmente servido.
          SERVED="$(curl -fsS "https://licitatis.es/$PROBE?cb=${DEPLOY_SHA}" 2>/dev/null | tr -d '\r\n' || true)"
          # 3) Limpia las sondas.
          ssh $SSHO "$SSH_USER@$SSH_HOST" 'PB="'"$PROBE"'"; for d in "$HOME/public_html" "$HOME/domains/licitatis.es/public_html"; do rm -f "$d/$PB" 2>/dev/null || true; done' || true
          # 4) La respuesta debe ser una ruta absoluta; si no (p.ej. un .htaccess devolvió HTML), se descarta.
          case "$SERVED" in
            /*) : ;;
            *) SERVED="" ;;
          esac
          if [ -z "$SERVED" ]; then
            echo "::warning::No se detectó el docroot por sonda HTTP; se usa ~/public_html si existe."
            SERVED="$(ssh $SSHO "$SSH_USER@$SSH_HOST" 'if [ -d "$HOME/public_html" ]; then printf "%s" "$HOME/public_html"; fi' 2>/dev/null || true)"
          fi
          case "$SERVED" in
            */public_html*) : ;;
            *) echo "::error::No se pudo determinar un docroot válido (obtenido: '${SERVED:-<vacío>}'). Abortando."; exit 1 ;;
          esac
          if [ "$SERVED" != "$DEPLOY_PATH" ]; then
            echo "::warning::licitatis.es se sirve desde '$SERVED' (el secreto HOSTINGER_DEPLOY_PATH apunta a otra carpeta). Se despliega en el docroot servido."
          fi
          echo "Docroot servido: $SERVED"
          echo "TARGET=$SERVED" >> "$GITHUB_ENV"

      - name: Copia de seguridad remota (rollback)
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USERNAME }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
        run: |
          SSH_PORT="$(printf '%s' "$SSH_PORT" | tr -d '\r\n')"
          SSH_USER="$(printf '%s' "$SSH_USER" | tr -d '\r\n')"
          SSH_HOST="$(printf '%s' "$SSH_HOST" | tr -d '\r\n')"
          # $TARGET = docroot realmente servido (paso de autodetección). Reglas:
          #  - Si el directorio existe y el backup FALLA -> abortar (no hay rollback fiable).
          #  - Primer despliegue (directorio inexistente) -> continuar sin backup.
          #  - Retención: se conservan los 5 backups más recientes; los antiguos se borran.
          # Sin "|| echo warning": un fallo de backup debe detener el despliegue.
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 "$SSH_USER@$SSH_HOST" \
            "DP='$TARGET'; if [ -d \"\$DP\" ]; then BK=\"\${DP%/}.backup-$(date +%Y%m%d%H%M%S)\"; if cp -a \"\$DP\" \"\$BK\"; then echo \"Backup creado: \$BK\"; ls -dt \"\${DP%/}\".backup-* 2>/dev/null | tail -n +6 | xargs -r rm -rf; echo 'Retención aplicada (5 backups).'; else echo '::error::No se pudo crear el backup; se aborta el despliegue por falta de rollback.'; exit 1; fi; else echo 'Primer despliegue: aún no hay contenido que respaldar.'; fi"

      - name: Sincronizar out/ hacia el docroot servido
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USERNAME }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
        run: |
          SSH_PORT="$(printf '%s' "$SSH_PORT" | tr -d '\r\n')"
          SSH_USER="$(printf '%s' "$SSH_USER" | tr -d '\r\n')"
          SSH_HOST="$(printf '%s' "$SSH_HOST" | tr -d '\r\n')"
          # $TARGET = docroot realmente servido (paso de autodetección).
          # Usar $HOME (no ~) dentro de la cadena -e: el ~ NO se expande entre comillas dobles.
          # --delete sincroniza el docroot con out/. Se EXCLUYEN rutas gestionadas por
          # Hostinger/Apache o de validación externa para que --delete nunca las borre.
          # (Exclusiones por defecto y conservadoras; verificar en el servidor y ajustar
          # si existieran otras carpetas administradas. Ver docs/DEPLOYMENT.md.)
          set +e
          RS_OUT="$(rsync -az --delete \
            --exclude='.well-known/' \
            --exclude='cgi-bin/' \
            --exclude='.htpasswd' \
            --exclude='.user.ini' \
            --exclude='error_log' \
            --exclude='__docroot_probe_*.txt' \
            -e "ssh -i $HOME/.ssh/id_deploy -p $SSH_PORT -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20" \
            out/ \
            "$SSH_USER@$SSH_HOST:$TARGET/" 2>&1)"
          RS_RC=$?
          set -e
          if [ "$RS_RC" -ne 0 ]; then
            echo "::error::rsync falló (rc=$RS_RC). Salida: $(printf '%s' "$RS_OUT" | tail -4 | tr '\n' ' | ')"
            exit 1
          fi
          echo "Sincronización completada en $TARGET."

      - name: Verificar que la web sirve ESTE commit
        run: |
          sleep 5
          URL="https://licitatis.es/__build_sha.txt?cb=${DEPLOY_SHA}"
          GOT="$(curl -fsS "$URL" 2>/dev/null | tr -d '\r\n' || true)"
          if [ "$GOT" = "$DEPLOY_SHA" ]; then
            echo "✅ Verificado: licitatis.es sirve el commit $DEPLOY_SHA."
          else
            echo "::error::La web pública NO sirve el commit desplegado. Esperado '$DEPLOY_SHA', obtenido '${GOT:-<vacío o 404>}'. El rsync no llegó al docroot servido (TARGET='$TARGET'). Revisa el aviso del paso de autodetección."
            exit 1
          fi

      - name: Resumen del despliegue
        run: echo "✅ Desplegado el commit $DEPLOY_SHA en Hostinger ($TARGET)."
